# DigitLink推广定时任务配置
# 基于Harness Engineering原则 - 状态外部化 + 完成验证

# ====================
# 每日竞品监控
# ===================
competitor_watch:
  enabled: true
  schedule: "0 8 * * *"
  task: |
    执行竞品监控任务：
    1. 读取 soul/ 目录了解最新规则
    2. 创建 state/competitor_watch/{date}.json 状态文件
    3. 执行竞品数据采集
    4. 写入 data/competitors_{date}.json
    5. 验证：test -f data/competitors_{date}.json && wc -l > 10
    6. 更新状态文件 completed_at + evidence
    7. 清洁退出：清理临时文件

# ====================
# 每日内容发布
# ===================
daily_posting:
  enabled: true
  schedule: "0 18,19,20 * * *"
  task: |
    执行内容发布任务：
    1. 读取 soul/ 目录了解最新规则
    2. 创建 state/posting/{date}_{time}.json 状态文件
    3. 从素材库获取今日内容
    4. 发布到 TikTok/Instagram/Facebook
    5. 验证：curl -I {post_url} | grep HTTP 200
    6. 截图保存到 evidence/posting_{task_id}/
    7. 更新状态文件 completed_at + evidence
    8. 清洁退出：清理临时文件

# ====================
# 每周数据分析
# ===================
weekly_report:
  enabled: true
  schedule: "0 9 * * 1"
  task: |
    生成周报：
    1. 读取 soul/ 目录了解最新规则
    2. 创建 state/report/weekly_{date}.json 状态文件
    3. 汇总本周数据（state/ 目录下所有完成的任务）
    4. 生成 reports/weekly_{date}.md
    5. 验证：test -f reports/weekly_{date}.md && wc -w > 100
    6. 更新状态文件 completed_at + evidence
    7. 清洁退出：清理临时文件

# ====================
# 每日评论回复检查
# ===================
comment_check:
  enabled: true
  schedule: "0 */2 * * *"
  task: |
    评论管理任务：
    1. 读取 soul/ 目录了解最新规则
    2. 创建 state/comment_reply/{date}_{time}.json 状态文件
    3. 检查新评论
    4. 生成AI回复（调用LLM）
    5. 提交人工审批（或自动批准低风险回复）
    6. 执行回复
    7. 记录到 logs/replies_{date}.json
    8. 验证：grep -c "reply_sent" > 0
    9. 更新状态文件 completed_at + evidence
    10. 清洁退出：清理临时文件

# ====================
# 每月策略复盘
# ===================
monthly_review:
  enabled: true
  schedule: "0 10 1 * *"
  task: |
    月度复盘任务：
    1. 读取 soul/ 目录了解最新规则
    2. 创建 state/report/monthly_{date}.json 状态文件
    3. 汇总月度数据
    4. 分析变现效果
    5. 生成 reports/monthly_{date}.md
    6. 验证：test -f reports/monthly_{date}.md && wc -w > 200
    7. 更新状态文件 completed_at + evidence
    8. 清洁退出：清理临时文件

# ====================
# Harness Engineering 状态管理规则
# ===================
harness_rules:
  state_externalization: true
  state_path: "state/{task_type}/{date}.json"
  
  verification_required: true
  verification_path: "verification/"
  
  evidence_required: true
  evidence_path: "evidence/{task_type}/{task_id}/"
  
  diagnostic_6_questions:
    - "saw_rules: Agent是否看到了规则？"
    - "had_tools: Agent是否有可执行工具？"
    - "had_env: Agent是否有可复现环境？"
    - "had_state: Agent是否有持续状态？"
    - "had_feedback: Agent是否有验证反馈？"
    - "clean_exit: Agent是否清洁退出？"
  
  completion_criteria:
    - "构建完成（无错误）"
    - "验证通过（证据存在）"
    - "交接写入（状态外部化）"
    - "清洁退出（临时文件清理）"

# DigitLink推广定时任务配置
# 自动执行推广任务

# ===================
# 每日竞品监控
# ===================
competitor_watch:
  enabled: true
  schedule: "0 8 * * *"  # 美国东部时间每天早上8点
  task: |
    执行竞品监控任务：
    1. 抓取TikTok热门账号视频
    2. 分析热门内容趋势
    3. 记录到竞品数据库
    4. 生成每日报告

# ===================
# 每日内容发布
# ===================
daily_posting:
  enabled: true
  schedule: "0 18,19,20 * * *"  # 美国东部时间晚6-8点
  task: |
    执行内容发布任务：
    1. 从素材库获取今日内容
    2. 发布到TikTok/Instagram/Facebook
    3. 添加热门话题标签
    4. 记录发布结果

# ===================
# 每周数据分析
# ===================
weekly_report:
  enabled: true
  schedule: "0 9 * * 1"  # 美国东部时间每周一早上9点
  task: |
    生成周报：
    1. 统计本周涨粉数据
    2. 分析内容表现
    3. 对比竞品数据
    4. 提出优化建议

# ===================
# 每日评论回复检查
# ===================
comment_check:
  enabled: true
  schedule: "0 */2 * * *"  # 每2小时检查一次
  task: |
    评论管理任务：
    1. 检查新评论
    2. 生成AI回复
    3. 提交人工审批
    4. 执行批准回复

# ===================
# 每月策略复盘
# ===================
monthly_review:
  enabled: true
  schedule: "0 10 1 * *"  # 每月1号早上10点
  task: |
    月度复盘任务：
    1. 汇总月度数据
    2. 分析变现效果
    3. 制定下月策略
    4. 更新推广计划
